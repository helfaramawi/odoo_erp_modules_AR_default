<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#C55A11;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#C55A11CC;stop-opacity:1"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <!-- Background rounded square -->
  <rect width="100" height="100" rx="18" ry="18" fill="url(#bgGrad)"/>
  
  <!-- Icon shape -->
  
        <rect x="28" y="30" width="36" height="16" rx="4" fill="#FFFFFF" 
              transform="rotate(-45 46 38)"/>
        <rect x="20" y="55" width="40" height="10" rx="3" fill="#FFFFFF" opacity="0.8"/>
        <circle cx="50" cy="72" r="6" fill="#FFFFFF" opacity="0.6"/>
        
  
  <!-- Arabic label at bottom -->
  <text x="50" y="92" 
        font-family="Arial, sans-serif" 
        font-size="11"
        font-weight="bold"
        fill="#FFFFFF"
