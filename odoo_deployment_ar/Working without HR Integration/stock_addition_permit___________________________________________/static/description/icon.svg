<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7030A0;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#7030A0CC;stop-opacity:1"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <!-- Background rounded square -->
  <rect width="100" height="100" rx="18" ry="18" fill="url(#bgGrad)"/>
  
  <!-- Icon shape -->
  
        <rect x="42" y="22" width="16" height="56" rx="6" fill="#FFFFFF"/>
        <rect x="22" y="42" width="56" height="16" rx="6" fill="#FFFFFF"/>
        
  
  <!-- Arabic label at bottom -->
