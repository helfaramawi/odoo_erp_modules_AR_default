version: "3.8"
services:
  db:
    image: postgres:15
    container_name: odoo17_db
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: odoo
      POSTGRES_PASSWORD: odoo_secure_pass
    volumes:
      - odoo_db_data:/var/lib/postgresql/data
    networks:
      - odoo_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U odoo"]
      interval: 5s
      timeout: 5s
      retries: 10
  odoo:
    image: odoo:17.0
    container_name: odoo17_app
    depends_on:
      db:
        condition: service_healthy
    environment:
      HOST: db
      USER: odoo
      PASSWORD: odoo_secure_pass
    ports:
      - "8069:8069"
    volumes:
      - odoo_web_data:/var/lib/odoo
      - ./addons:/mnt/extra-addons
      - ./odoo.conf:/etc/odoo/odoo.conf
    networks:
      - odoo_net
    restart: unless-stopped
    entrypoint: ["/bin/bash","-c","odoo -c /etc/odoo/odoo.conf"]
volumes:
  odoo_db_data:
  odoo_web_data:
networks:
  odoo_net:
    driver: bridge
